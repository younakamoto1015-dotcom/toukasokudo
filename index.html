<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等加速度直線運動シミュレーター</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --bg: #f4f7f6;
            --text: #333;
            --ball-A: #111111;
            --ball-B: #007aff;
            --grid-color: #dee2e6;
            --color-x: #28a745;
            --color-v: #fd7e14;
            --color-a: #6f42c1;
        }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            padding: 10px; 
            background-color: var(--bg); 
            color: var(--text); 
            min-height: 100vh; /* スクロールを許可するため制限を解除 */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        
        /* トップコントロール */
        .top-bar { 
            display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px;
            background: #fff; padding: 10px 15px; border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            flex-shrink: 0; margin-bottom: 10px;
        }
        .controls-left { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        select { padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.95rem; }
        
        /* パラメータ入力欄 */
        .ball-settings { display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-radius: 6px; font-size: 0.9rem; }
        .panel-a { background: rgba(0, 0, 0, 0.05); border: 1px solid rgba(0, 0, 0, 0.3); }
        .panel-b { background: rgba(0, 122, 255, 0.08); border: 1px solid rgba(0, 122, 255, 0.3); }
        .ball-label { font-weight: bold; margin-right: 2px; }
        .ball-settings label { display: flex; align-items: center; gap: 2px; }
        .ball-settings input[type="number"] { width: 50px; text-align: right; padding: 2px 4px; border: 1px solid #ccc; border-radius: 4px; }

        button { padding: 6px 16px; border: none; border-radius: 4px; font-weight: bold; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
        .btn-start { background: var(--primary); color: #fff; }
        .btn-start:hover { background: #0056b3; }
        .btn-reset { background: #6c757d; color: #fff; }
        .btn-reset:hover { background: #5a6268; }
        .timer-display { font-size: 1.3rem; font-family: monospace; font-weight: bold; background: #e9ecef; padding: 4px 12px; border-radius: 4px; }

        /* メインレイアウト (Gridで完全制御) */
        .main-area { 
            display: grid; 
            gap: 12px; 
            padding-bottom: 20px;
        }
        
        /* 水平レイアウト：Canvas上、グラフ3つ下（1列に3つ） */
        .layout-horizontal { 
            grid-template-columns: repeat(3, 1fr);
            /* 縦方向の大きさをウィンドウの高さ（vh）に依存させる */
            grid-template-rows: 55vh 75vh; 
        }
        .layout-horizontal .canvas-section { grid-column: 1 / span 3; grid-row: 1; }
        .layout-horizontal .box-x { grid-column: 1; grid-row: 2; }
        .layout-horizontal .box-v { grid-column: 2; grid-row: 2; }
        .layout-horizontal .box-a { grid-column: 3; grid-row: 2; }
        
        /* 鉛直レイアウト：Canvas左、グラフは右側に正確な逆ピラミッド型に配置 */
        .layout-vertical { 
            /* 左のキャンバス幅をウィンドウ幅の25%（vw）に、残りエリアを均等な4列に分割 */
            grid-template-columns: 25vw 1fr 1fr 1fr 1fr; 
            /* 縦方向の大きさをウィンドウの高さ（vh）に依存させる */
            grid-template-rows: 65vh 65vh; 
        }
        .layout-vertical .canvas-section { grid-column: 1; grid-row: 1 / span 2; }
        .layout-vertical .box-x { grid-column: 2 / span 2; grid-row: 1; } /* 4列中、左の2列分 */
        .layout-vertical .box-v { grid-column: 4 / span 2; grid-row: 1; } /* 4列中、右の2列分 */
        .layout-vertical .box-a { grid-column: 3 / span 2; grid-row: 2; } /* 4列中、中央の2列分。これで3つとも完全に同じ大きさの逆ピラミッドになる */

        .canvas-section { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background: #fff; 
            border-radius: 8px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1); 
            border: 1px solid #ddd; 
            min-height: 0; 
            min-width: 0; 
            overflow: hidden; /* コンテナ膨張バグを防ぐ最重要プロパティ */
        }
        
        /* canvasが親要素を押し広げないよう絶対配置にする */
        #simCanvas { 
            position: absolute; 
            top: 0; left: 0;
            display: block; 
            width: 100%; 
            height: 100%; 
        }
        
        /* グラフボックスのスタイリング */
        .chart-box { 
            background: #fff; border-radius: 8px; padding: 10px; 
            box-shadow: 0 1px 4px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; min-height: 0; min-width: 0;
        }
        
        .chart-wrapper {
            position: relative;
            flex: 1;
            min-height: 0;
            min-width: 0;
            width: 100%;
            height: 100%;
        }

        .box-x { border-top: 4px solid var(--color-x); background: #f8fff9; }
        .box-v { border-top: 4px solid var(--color-v); background: #fffaf6; }
        .box-a { border-top: 4px solid var(--color-a); background: #fbf8ff; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="controls-left">
            <select id="directionSel" onchange="onDirectionChange()">
                <option value="horizontal">水平方向の運動</option>
                <option value="vertical_down">鉛直方向 (下向き正)</option>
                <option value="vertical_up">鉛直方向 (上向き正)</option>
            </select>

            <div class="ball-settings panel-a">
                <span class="ball-label" style="color:var(--ball-A);">A(黒)</span>
                <label>x₀<input type="number" id="inpX0A" value="0" step="1" oninput="onInputChange()"></label>
                <label>v₀<input type="number" id="inpV0A" value="5" step="1" oninput="onInputChange()"></label>
                <label>a<input type="number" id="inpAA" value="0" step="0.1" oninput="onInputChange()"></label>
            </div>
            
            <div class="ball-settings panel-b">
                <label class="ball-label" style="color:var(--ball-B); cursor:pointer;">
                    <input type="checkbox" id="enableBallB" onchange="onInputChange()"> B(青)
                </label>
                <label>x₀<input type="number" id="inpX0B" value="0" step="1" oninput="onInputChange()"></label>
                <label>v₀<input type="number" id="inpV0B" value="-5" step="1" oninput="onInputChange()"></label>
                <label>a<input type="number" id="inpAB" value="-2" step="0.1" oninput="onInputChange()"></label>
            </div>

            <button class="btn-start" id="startBtn" onclick="toggleSim()">スタート</button>
            <button class="btn-reset" onclick="resetSim()">リセット</button>
        </div>
        <div class="timer-display">t = <span id="timeVal">0.00</span> s</div>
    </div>

    <div id="mainArea" class="main-area layout-horizontal">
        <div class="canvas-section" id="canvasWrap">
            <canvas id="simCanvas"></canvas>
        </div>
        
        <div class="chart-box box-x"><div class="chart-wrapper"><canvas id="chartX"></canvas></div></div>
        <div class="chart-box box-v"><div class="chart-wrapper"><canvas id="chartV"></canvas></div></div>
        <div class="chart-box box-a"><div class="chart-wrapper"><canvas id="chartA"></canvas></div></div>
    </div>
</div>

<script>
    // --- 状態と設定の管理 ---
    const MAX_TIME = 5.0; 
    let isRunning = false;
    let time = 0;
    let lastTimestamp = 0;
    let reqAnimFrameId = null;
    let drawScale = 1; // px per meter
    let originOffset = 0; // キャンバス端からの原点位置(ピクセル)
    let lastChartPushTime = -0.1; 

    let currentMode = 'horizontal';

    // 3つのモードそれぞれの設定を独立して記憶する
    const modeSettings = {
        horizontal: {
            A: { enabled: true, x0: 0, v0: 5, a: 0 },
            B: { enabled: false, x0: 0, v0: -5, a: -2 }
        },
        vertical_down: {
            A: { enabled: true, x0: 0, v0: 0, a: 9.8 },
            B: { enabled: false, x0: 0, v0: 5, a: 9.8 }
        },
        vertical_up: {
            A: { enabled: true, x0: 0, v0: 10, a: -9.8 },
            B: { enabled: false, x0: 0, v0: 15, a: -9.8 }
        }
    };

    // 実際のシミュレーションで使われる現在の物体データ
    let balls = {
        A: { color: 'var(--ball-A)', name: '小球A (黒)', ...modeSettings.horizontal.A },
        B: { color: 'var(--ball-B)', name: '小球B (青)', ...modeSettings.horizontal.B }
    };

    // グラフデータ履歴
    let chartData = { time: [], Ax:[], Av:[], Aa:[], Bx:[], Bv:[], Ba:[] };
    let chartInstances = {};

    // DOM要素
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    const COLOR_X = '#28a745';
    const COLOR_V = '#fd7e14';
    const COLOR_A = '#6f42c1';

    // --- 初期化処理 ---
    function init() {
        resizeCanvas();
        window.addEventListener('resize', () => { updateAll(); });
        initCharts();
        
        // 初期状態UIセット
        updateUIFromState();
        updateAll();
    }

    // UIに現在のballsのデータを反映
    function updateUIFromState() {
        document.getElementById('inpX0A').value = balls.A.x0;
        document.getElementById('inpV0A').value = balls.A.v0;
        document.getElementById('inpAA').value = balls.A.a;
        
        document.getElementById('enableBallB').checked = balls.B.enabled;
        document.getElementById('inpX0B').value = balls.B.x0;
        document.getElementById('inpV0B').value = balls.B.v0;
        document.getElementById('inpAB').value = balls.B.a;
    }

    // 方向選択時の処理（独立した設定の切り替え）
    function onDirectionChange() {
        const newMode = document.getElementById('directionSel').value;
        const mainArea = document.getElementById('mainArea');
        
        // 現在のモードの設定を保存する
        modeSettings[currentMode].A = { enabled: balls.A.enabled, x0: balls.A.x0, v0: balls.A.v0, a: balls.A.a };
        modeSettings[currentMode].B = { enabled: balls.B.enabled, x0: balls.B.x0, v0: balls.B.v0, a: balls.B.a };

        // 新しいモードに切り替え
        currentMode = newMode;

        // 新しいモードの設定を読み込む
        Object.assign(balls.A, modeSettings[currentMode].A);
        Object.assign(balls.B, modeSettings[currentMode].B);

        // レイアウトクラスの切り替え
        if (currentMode === 'horizontal') {
            mainArea.className = 'main-area layout-horizontal';
        } else {
            mainArea.className = 'main-area layout-vertical';
        }
        
        updateUIFromState();
        
        // レイアウト変更完了後にCanvas解像度とChartサイズを強制リフレッシュする
        setTimeout(() => {
            updateAll();
            Object.values(chartInstances).forEach(c => c.resize());
        }, 50); 
    }

    // パラメータ入力時の処理
    function onInputChange() {
        balls.A.x0 = parseFloat(document.getElementById('inpX0A').value) || 0;
        balls.A.v0 = parseFloat(document.getElementById('inpV0A').value) || 0;
        balls.A.a  = parseFloat(document.getElementById('inpAA').value) || 0;
        
        balls.B.enabled = document.getElementById('enableBallB').checked;
        balls.B.x0 = parseFloat(document.getElementById('inpX0B').value) || 0;
        balls.B.v0 = parseFloat(document.getElementById('inpV0B').value) || 0;
        balls.B.a  = parseFloat(document.getElementById('inpAB').value) || 0;

        // 入力した時点ですぐに保存用オブジェクトにも反映させておく
        modeSettings[currentMode].A = { enabled: balls.A.enabled, x0: balls.A.x0, v0: balls.A.v0, a: balls.A.a };
        modeSettings[currentMode].B = { enabled: balls.B.enabled, x0: balls.B.x0, v0: balls.B.v0, a: balls.B.a };

        updateAll();
    }

    // --- 物理計算とスケール・原点調整 ---
    function calcPhysics(ball, t) {
        return {
            x: ball.x0 + ball.v0 * t + 0.5 * ball.a * t * t,
            v: ball.v0 + ball.a * t,
            a: ball.a
        };
    }

    function calcBoundsAndScale() {
        let minX = 0, maxX = 0;
        let minV = 0, maxV = 0;
        let minA = 0, maxA = 0;
        let activeBallsCount = 0;

        const checkBounds = (ball) => {
            if (!ball.enabled) return;
            activeBallsCount++;
            
            let tPeak = ball.a !== 0 ? -ball.v0 / ball.a : -1;
            let times = [0, MAX_TIME];
            if (tPeak > 0 && tPeak < MAX_TIME) times.push(tPeak);

            let first = true;
            times.forEach(t => {
                let p = calcPhysics(ball, t);
                if(first && activeBallsCount === 1) { minX = maxX = p.x; first = false; }
                else { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); }
            });
            
            let p0 = calcPhysics(ball, 0), p5 = calcPhysics(ball, MAX_TIME);
            minV = Math.min(minV, p0.v, p5.v); maxV = Math.max(maxV, p0.v, p5.v);
            minA = Math.min(minA, ball.a); maxA = Math.max(maxA, ball.a);
        };

        checkBounds(balls.A);
        checkBounds(balls.B);

        const isHoriz = currentMode === 'horizontal';
        const padding = isHoriz ? 70 : 100; 
        const canvasDim = isHoriz ? canvas.width : canvas.height;
        
        let availableLen = canvasDim - padding * 2;
        if (availableLen < 100) availableLen = 100; 
        
        let totalRange = maxX - minX;
        if (totalRange < 1) totalRange = 10; 

        drawScale = availableLen / totalRange;
        
        if (currentMode === 'horizontal') {
            originOffset = padding - minX * drawScale;
        } else if (currentMode === 'vertical_down') {
            originOffset = padding - minX * drawScale;
        } else { // vertical_up
            originOffset = padding + maxX * drawScale;
        }

        return { x: [minX, maxX], v: [minV, maxV], a: [minA, maxA] };
    }

    // 実座標から画面座標への変換
    function getScreenPos(val, offset) {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        
        if (currentMode === 'horizontal') {
            return { x: originOffset + val * drawScale, y: cy + offset };
        } else if (currentMode === 'vertical_down') {
            return { x: cx + offset, y: originOffset + val * drawScale };
        } else { // vertical_up
            return { x: cx + offset, y: originOffset - val * drawScale };
        }
    }

    function updateAll() {
        resizeCanvas(); 
        const bounds = calcBoundsAndScale();
        updateChartBounds(bounds);
        if(!isRunning) drawCanvas(time);
    }

    // --- 描画処理 (Canvas) ---
    function resizeCanvas() {
        const wrap = document.getElementById('canvasWrap');
        if (wrap.clientWidth === 0 || wrap.clientHeight === 0) return; // 非表示時のエラー防止
        if (canvas.width !== wrap.clientWidth || canvas.height !== wrap.clientHeight) {
            canvas.width = wrap.clientWidth;
            canvas.height = wrap.clientHeight;
        }
    }

    function calcTickInterval() {
        const minPixels = 70; 
        const valPerMinPixels = minPixels / drawScale;
        if(valPerMinPixels === Infinity || isNaN(valPerMinPixels)) return 10;
        const mag = Math.pow(10, Math.floor(Math.log10(valPerMinPixels)));
        const res = valPerMinPixels / mag;
        let tick = 1;
        if (res > 5) tick = 10;
        else if (res > 2) tick = 5;
        else if (res > 1) tick = 2;
        return tick * mag;
    }

    function drawCanvas(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const isHoriz = currentMode === 'horizontal';
        const canvasDim = isHoriz ? canvas.width : canvas.height;
        
        const tickVal = calcTickInterval();
        const bounds = calcBoundsAndScale(); 
        let minVal = Math.floor(bounds.x[0] / tickVal) * tickVal - tickVal;
        let maxVal = Math.ceil(bounds.x[1] / tickVal) * tickVal + tickVal;

        const drawTextWithOutline = (text, x, y) => {
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.strokeText(text, x, y);
            ctx.fillStyle = '#555';
            ctx.fillText(text, x, y);
        };

        // 1. 背景グリッドと目盛り
        ctx.font = 'bold 14px Arial'; 
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        for (let val = minVal; val <= maxVal; val += tickVal) {
            let px = val * drawScale;
            let pos;
            if (currentMode === 'horizontal') pos = originOffset + px;
            else if (currentMode === 'vertical_down') pos = originOffset + px;
            else pos = originOffset - px;
            
            if (pos < 0 || pos > canvasDim) continue; 

            let text = Math.abs(val) < 0.001 ? '0' : parseFloat(val.toFixed(2)).toString();

            if (isHoriz) {
                ctx.strokeStyle = (val===0) ? '#999' : 'var(--grid-color)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, canvas.height); ctx.stroke();
                if(val !== 0) { ctx.beginPath(); ctx.moveTo(pos, cy - 8); ctx.lineTo(pos, cy + 8); ctx.strokeStyle='#333'; ctx.stroke(); }
                drawTextWithOutline(text, pos + 15, cy + 22); 
            } else {
                ctx.strokeStyle = (val===0) ? '#999' : 'var(--grid-color)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(canvas.width, pos); ctx.stroke();
                if(val !== 0) { ctx.beginPath(); ctx.moveTo(cx - 8, pos); ctx.lineTo(cx + 8, pos); ctx.strokeStyle='#333'; ctx.stroke(); }
                ctx.textAlign = 'left';
                drawTextWithOutline(text, cx + 15, pos - 15); 
            }
        }

        // 2. 座標軸と矢印
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.fillStyle = '#333';
        
        if (currentMode === 'horizontal') {
            ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
            let arrowX = canvas.width - 20; 
            ctx.beginPath(); ctx.moveTo(arrowX, cy); ctx.lineTo(arrowX - 12, cy - 6); ctx.lineTo(arrowX - 12, cy + 6); ctx.fill();
            ctx.textAlign = 'center'; ctx.font = 'bold 16px sans-serif'; ctx.fillText('+x (正)', arrowX - 25, cy - 20);
        } else if (currentMode === 'vertical_down') {
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
            let arrowY = canvas.height - 20; 
            ctx.beginPath(); ctx.moveTo(cx, arrowY); ctx.lineTo(cx - 6, arrowY - 12); ctx.lineTo(cx + 6, arrowY - 12); ctx.fill();
            ctx.textAlign = 'left'; ctx.font = 'bold 16px sans-serif'; ctx.fillText('+y (正)', cx + 15, arrowY - 15);
        } else { // vertical_up
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
            let arrowY = 20; 
            ctx.beginPath(); ctx.moveTo(cx, arrowY); ctx.lineTo(cx - 6, arrowY + 12); ctx.lineTo(cx + 6, arrowY + 12); ctx.fill();
            ctx.textAlign = 'left'; ctx.font = 'bold 16px sans-serif'; ctx.fillText('+y (正)', cx + 15, arrowY + 15);
        }

        // 3. 小球と各種パラメータの描画
        const drawObj = (ball, offset) => {
            if(!ball.enabled) return;
            const p = calcPhysics(ball, t);
            const pos = getScreenPos(p.x, offset);
            
            // 小球本体
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 16, 0, Math.PI*2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.font = 'bold 16px sans-serif';

            let textX_pos, textY_pos, textX_acc, textY_acc, textAlignStr;
            let isLeft = offset <= 0;

            if (isHoriz) {
                textX_pos = pos.x; textY_pos = pos.y - 25;
                textX_acc = pos.x; textY_acc = pos.y + 35;
                textAlignStr = 'center';
            } else {
                textX_pos = pos.x + (isLeft ? -25 : 25);
                textX_acc = pos.x + (isLeft ? -25 : 25);
                textY_pos = pos.y - 15;
                textY_acc = pos.y + 15;
                textAlignStr = isLeft ? 'right' : 'left';
            }
            
            ctx.textAlign = textAlignStr;
            
            // x (位置)
            ctx.fillStyle = COLOR_X;
            ctx.fillText(`x=${p.x.toFixed(1)} [m]`, textX_pos, textY_pos);
            // a (加速度)
            ctx.fillStyle = COLOR_A;
            ctx.fillText(`a=${p.a.toFixed(1)} [m/s²]`, textX_acc, textY_acc);

            // 速度ベクトル
            if (Math.abs(p.v) > 0.05) {
                let vLen = Math.max(30, Math.min(Math.abs(p.v) * 6, 80)); 
                let vx = 0, vy = 0;
                
                if (currentMode === 'horizontal') {
                    vx = Math.sign(p.v) * vLen;
                } else if (currentMode === 'vertical_down') {
                    vy = Math.sign(p.v) * vLen; 
                } else { 
                    vy = -Math.sign(p.v) * vLen; 
                }
                
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                ctx.lineTo(pos.x + vx, pos.y + vy);
                ctx.strokeStyle = COLOR_V;
                ctx.lineWidth = 4;
                ctx.stroke();

                let headLen = 10;
                let angle = Math.atan2(vy, vx);
                ctx.beginPath();
                ctx.moveTo(pos.x + vx, pos.y + vy);
                ctx.lineTo(pos.x + vx - headLen * Math.cos(angle - Math.PI/6), pos.y + vy - headLen * Math.sin(angle - Math.PI/6));
                ctx.lineTo(pos.x + vx - headLen * Math.cos(angle + Math.PI/6), pos.y + vy - headLen * Math.sin(angle + Math.PI/6));
                ctx.lineTo(pos.x + vx, pos.y + vy);
                ctx.fillStyle = COLOR_V;
                ctx.fill();

                ctx.fillStyle = COLOR_V;
                if (isHoriz) {
                    ctx.textAlign = p.v > 0 ? 'left' : 'right';
                    ctx.fillText(`v=${p.v.toFixed(1)} [m/s]`, pos.x + vx + (p.v > 0 ? 5 : -5), pos.y - 10);
                } else {
                    ctx.textAlign = isLeft ? 'right' : 'left';
                    ctx.fillText(`v=${p.v.toFixed(1)} [m/s]`, pos.x + (isLeft ? -15 : 15), pos.y + vy + (p.v > 0 ? 0 : 15));
                }
            } else {
                 ctx.fillStyle = COLOR_V;
                 if (isHoriz) {
                     ctx.textAlign = 'center'; 
                     ctx.fillText(`v=0.0 [m/s]`, pos.x, pos.y - 45); 
                 } else {
                     ctx.textAlign = textAlignStr; 
                     ctx.fillText(`v=0.0 [m/s]`, pos.x + (isLeft ? -25 : 25), pos.y);
                 }
            }
        };

        let offsetA = isHoriz ? -30 : -25;
        let offsetB = isHoriz ? 30 : 25;
        if (!balls.B.enabled) offsetA = 0; 

        drawObj(balls.A, offsetA);
        drawObj(balls.B, offsetB);
    }

    // --- グラフ処理 (Chart.js) ---
    function initCharts() {
        Chart.defaults.font.family = "'Helvetica Neue', 'Helvetica', 'Arial', sans-serif";
        Chart.defaults.animation = false;

        const config = (title, yLabel) => ({
            type: 'line',
            data: { labels: chartData.time, datasets: [] },
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { 
                    legend: { display: false }, 
                    title: { display: true, text: title, font: {size: 14}, padding: {top: 2, bottom: 2} },
                    tooltip: {
                        filter: function(context) {
                            const t = Math.round(context.parsed.x * 10) / 10;
                            return t % 0.5 === 0;
                        }
                    }
                },
                scales: {
                    x: { type: 'linear', min: 0, max: MAX_TIME, title: { display: true, text: 't [s]' } },
                    y: { title: { display: true, text: yLabel } },
                },
                elements: { line: { tension: 0.1, borderWidth: 2 }, point: { radius: 0, hitRadius: 10 } }
            }
        });

        chartInstances.X = new Chart(document.getElementById('chartX'), config('x-t グラフ (位置)', '位置 [m]'));
        chartInstances.V = new Chart(document.getElementById('chartV'), config('v-t グラフ (速度)', '速度 [m/s]'));
        chartInstances.A = new Chart(document.getElementById('chartA'), config('a-t グラフ (加速度)', '加速度 [m/s²]'));
    }

    function updateChartBounds(bounds) {
        const pad = (arr) => {
            let [min, max] = arr;
            let rng = max - min;
            if (rng === 0) rng = 10;
            return { min: min - rng*0.1, max: max + rng*0.1 };
        };
        const bx = pad(bounds.x), bv = pad(bounds.v), ba = pad(bounds.a);

        chartInstances.X.options.scales.y.min = bx.min; chartInstances.X.options.scales.y.max = bx.max;
        chartInstances.V.options.scales.y.min = bv.min; chartInstances.V.options.scales.y.max = bv.max;
        chartInstances.A.options.scales.y.min = ba.min; chartInstances.A.options.scales.y.max = ba.max;
        
        Object.values(chartInstances).forEach(c => c.update());
    }

    function pushChartData(t) {
        chartData.time.push(t);
        const pA = calcPhysics(balls.A, t);
        chartData.Ax.push({x: t, y: pA.x});
        chartData.Av.push({x: t, y: pA.v});
        chartData.Aa.push({x: t, y: pA.a});

        if (balls.B.enabled) {
            const pB = calcPhysics(balls.B, t);
            chartData.Bx.push({x: t, y: pB.x});
            chartData.Bv.push({x: t, y: pB.v});
            chartData.Ba.push({x: t, y: pB.a});
        }
    }

    function renderCharts() {
        const makeDataset = (ballKey, dataKey) => ({
            label: balls[ballKey].name,
            data: chartData[ballKey+dataKey],
            borderColor: balls[ballKey].color,
            backgroundColor: balls[ballKey].color,
            borderWidth: 2, fill: false
        });

        const datasetsX = [makeDataset('A', 'x')];
        const datasetsV = [makeDataset('A', 'v')];
        const datasetsA = [makeDataset('A', 'a')];

        if (balls.B.enabled) {
            datasetsX.push(makeDataset('B', 'x'));
            datasetsV.push(makeDataset('B', 'v'));
            datasetsA.push(makeDataset('B', 'a'));
        }

        chartInstances.X.data.datasets = datasetsX;
        chartInstances.V.data.datasets = datasetsV;
        chartInstances.A.data.datasets = datasetsA;

        Object.values(chartInstances).forEach(c => c.update('none'));
    }

    // --- メインループ ---
    function step(timestamp) {
        if (!isRunning) return;
        
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = (timestamp - lastTimestamp) / 1000; 
        lastTimestamp = timestamp;

        time += deltaTime;

        if (time >= MAX_TIME) {
            time = MAX_TIME;
            isRunning = false;
            document.getElementById('startBtn').innerText = '完了';
            document.getElementById('startBtn').style.background = '#6c757d';
        }

        document.getElementById('timeVal').innerText = time.toFixed(2);
        drawCanvas(time);
        
        if (time - lastChartPushTime >= 0.1 || time === MAX_TIME) {
            let pushTime = Math.round((lastChartPushTime + 0.1) * 10) / 10;
            if(time === MAX_TIME) pushTime = MAX_TIME;
            pushChartData(pushTime);
            lastChartPushTime = pushTime;
            renderCharts();
        }

        if (isRunning) reqAnimFrameId = requestAnimationFrame(step);
    }

    function toggleSim() {
        if (time >= MAX_TIME) return;

        const btn = document.getElementById('startBtn');
        if (isRunning) {
            isRunning = false;
            cancelAnimationFrame(reqAnimFrameId);
            btn.innerText = '再開';
            btn.style.background = '#28a745';
        } else {
            if (time === 0) {
                updateAll();
                document.getElementById('directionSel').disabled = true;
                document.querySelectorAll('.ball-settings input').forEach(el => el.disabled = true);
                for(let key in chartData) chartData[key] = [];
                lastChartPushTime = -0.1;
            }
            isRunning = true;
            lastTimestamp = performance.now();
            reqAnimFrameId = requestAnimationFrame(step);
            btn.innerText = '一時停止';
            btn.style.background = '#dc3545';
        }
    }

    function resetSim() {
        isRunning = false;
        cancelAnimationFrame(reqAnimFrameId);
        time = 0;
        lastTimestamp = 0;
        lastChartPushTime = -0.1;
        document.getElementById('timeVal').innerText = '0.00';
        
        const btn = document.getElementById('startBtn');
        btn.innerText = 'スタート';
        btn.style.background = 'var(--primary)';
        
        document.getElementById('directionSel').disabled = false;
        document.querySelectorAll('.ball-settings input').forEach(el => el.disabled = false);

        for(let key in chartData) chartData[key] = []; 
        renderCharts();
        updateAll(); 
    }

    window.onload = init;
</script>

</body>
