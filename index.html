<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等加速度直線運動シミュレーター</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --bg: #f4f7f6;
            --text: #333;
            --grid-color: #dee2e6;
            --color-x: #28a745;
            --color-v: #fd7e14;
            --color-a: #6f42c1;
        }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            padding: 10px; 
            background-color: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        
        /* ヘッダー領域 (タイトル + コントロール) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* 画面が狭いときは折り返す */
            margin-bottom: 10px;
            gap: 10px;
        }
        .page-title {
            margin: 0;
            font-size: 1.4rem;
            color: #333;
            flex: 1 1 auto;
        }
        .main-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;
        }

        /* 設定パネル */
        .settings-panel {
            background: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .settings-row {
            display: flex;
            flex-wrap: wrap; /* 画面幅に応じて折り返し */
            align-items: center;
            gap: 10px;
        }

        select { padding: 6px 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 1rem; cursor: pointer; }
        
        /* パラメータ入力欄 */
        .ball-settings { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 6px 10px; 
            border-radius: 6px; 
            font-size: 1rem; 
            flex-wrap: wrap; /* iPad縦向きなどで改行を許容 */
        }
        .panel-a { background: rgba(0, 0, 0, 0.05); border: 1px solid rgba(0, 0, 0, 0.3); }
        .panel-b { background: rgba(0, 122, 255, 0.08); border: 1px solid rgba(0, 122, 255, 0.3); }
        .ball-label { font-weight: bold; margin-right: 2px; white-space: nowrap; }
        .ja-label { font-size: 0.85rem; color: #555; margin-right: 2px; white-space: nowrap; }
        .ball-settings label { display: flex; align-items: center; gap: 2px; font-weight: bold; white-space: nowrap; }
        .ball-settings input[type="number"] { 
            width: 60px; 
            text-align: right; 
            padding: 4px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 1.1rem;
            font-family: monospace;
            font-weight: bold;
        }
        .ball-settings input:disabled { background-color: #eee; color: #777; }
        
        .g-btn {
            padding: 4px 8px;
            font-size: 0.85rem;
            font-weight: bold;
            background: #e9ecef;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 2px;
            color: #333;
        }
        .g-btn:hover { background: #d3d9df; }
        .g-btn:disabled { background: #eee; color: #aaa; cursor: not-allowed; }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield; 
        }

        button.btn-start, button.btn-reset { 
            padding: 8px 16px; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: background 0.2s; 
            white-space: nowrap; 
        }
        .btn-start { background: var(--primary); color: #fff; }
        .btn-start:hover { background: #0056b3; }
        .btn-reset { background: #6c757d; color: #fff; }
        .btn-reset:hover { background: #5a6268; }
        .timer-display { 
            font-size: 1.4rem; 
            font-family: monospace; 
            font-weight: bold; 
            background: #e9ecef; 
            padding: 6px 12px; 
            border-radius: 4px; 
            white-space: nowrap; 
        }

        /* メインレイアウト */
        .main-area { 
            display: grid; 
            gap: 15px; 
            padding-bottom: 20px;
        }
        
        /* 水平レイアウト (Canvasの縦幅を少し小さく: 200px) */
        .layout-horizontal { 
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 200px auto; 
        }
        .layout-horizontal .canvas-section { grid-column: 1 / span 3; grid-row: 1; }
        .layout-horizontal .box-x { grid-column: 1; grid-row: 2; }
        .layout-horizontal .box-v { grid-column: 2; grid-row: 2; }
        .layout-horizontal .box-a { grid-column: 3; grid-row: 2; }
        
        /* 鉛直レイアウト */
        .layout-vertical { 
            grid-template-columns: 350px 1fr 1fr 1fr 1fr; 
            grid-template-rows: auto auto; 
        }
        .layout-vertical .canvas-section { grid-column: 1; grid-row: 1 / span 2; min-height: 500px; }
        .layout-vertical .box-x { grid-column: 2 / span 2; grid-row: 1; } 
        .layout-vertical .box-v { grid-column: 4 / span 2; grid-row: 1; } 
        .layout-vertical .box-a { grid-column: 3 / span 2; grid-row: 2; } 

        .canvas-section { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background: #fff; 
            border-radius: 8px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1); 
            border: 1px solid #ddd; 
            min-height: 0; 
            min-width: 0; 
            overflow: hidden; 
        }
        
        #simCanvas { 
            position: absolute; 
            top: 0; left: 0;
            display: block; 
            width: 100%; 
            height: 100%; 
        }
        
        /* グラフボックスのスタイリング */
        .chart-box { 
            background: #fff; border-radius: 8px; padding: 10px; 
            box-shadow: 0 1px 4px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; min-height: 0; min-width: 0;
            aspect-ratio: 1 / 1; 
            width: 100%;
        }

        .chart-title {
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
            position: relative; 
        }

        .toggle-graph {
            position: absolute;
            right: 0;
            top: 0;
            font-size: 0.85rem;
            font-weight: normal;
            cursor: pointer;
            color: #555;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .chart-wrapper {
            position: relative;
            flex: 1;
            min-height: 0;
            min-width: 0;
            width: 100%;
            height: 100%;
        }

        .box-x { border-top: 4px solid var(--color-x); background: #f8fff9; }
        .box-v { border-top: 4px solid var(--color-v); background: #fffaf6; }
        .box-a { border-top: 4px solid var(--color-a); background: #fbf8ff; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="header">
        <h1 class="page-title">等加速度直線運動と変位，速度，加速度の時間変化</h1>
        <div class="main-controls">
            <button class="btn-start" id="startBtn" onclick="toggleSim()">スタート</button>
            <button class="btn-reset" onclick="resetSim()">リセット</button>
            <div class="timer-display">t = <span id="timeVal">0.00</span> s</div>
        </div>
    </div>

    <div class="settings-panel">
        <div class="settings-row">
            <select id="directionSel" onchange="onDirectionChange()">
                <option value="horizontal">水平方向の運動</option>
                <option value="vertical_down">鉛直方向 (下向き正)</option>
                <option value="vertical_up">鉛直方向 (上向き正)</option>
            </select>
        </div>
        <div class="settings-row">
            <div class="ball-settings panel-a">
                <span class="ball-label" style="color:#111111;">小球A(黒)</span>
                <label><span class="ja-label">初期位置</span><span id="labelX0A">x₀</span>=<input type="number" id="inpX0A" value="0" step="1" oninput="onInputChange()" onfocus="this.select()"></label>
                <label><span class="ja-label">初速度</span>v₀=<input type="number" id="inpV0A" value="5" step="1" oninput="onInputChange()" onfocus="this.select()"></label>
                <label><span class="ja-label">加速度</span>a=<input type="number" id="inpAA" value="0" step="0.1" oninput="onInputChange()" onfocus="this.select()">
                    <button class="g-btn" type="button" id="btnGA" onclick="setGravity('A')" style="display:none;" title="重力加速度をセット">重力</button>
                </label>
            </div>
            
            <div class="ball-settings panel-b">
                <label class="ball-label" style="color:#007aff; cursor:pointer;">
                    <input type="checkbox" id="enableBallB" onchange="onInputChange()"> 小球B(青)
                </label>
                <label><span class="ja-label">初期位置</span><span id="labelX0B">x₀</span>=<input type="number" id="inpX0B" value="0" step="1" oninput="onInputChange()" onfocus="this.select()"></label>
                <label><span class="ja-label">初速度</span>v₀=<input type="number" id="inpV0B" value="5" step="1" oninput="onInputChange()" onfocus="this.select()"></label>
                <label><span class="ja-label">加速度</span>a=<input type="number" id="inpAB" value="0" step="0.1" oninput="onInputChange()" onfocus="this.select()">
                    <button class="g-btn" type="button" id="btnGB" onclick="setGravity('B')" style="display:none;" title="重力加速度をセット">重力</button>
                </label>
            </div>
        </div>
    </div>

    <div id="mainArea" class="main-area layout-horizontal">
        <div class="canvas-section" id="canvasWrap">
            <canvas id="simCanvas"></canvas>
        </div>
        
        <div class="chart-box box-x">
            <div class="chart-title">
                <span id="titleChartX">x-t グラフ (変位)</span>
                <label class="toggle-graph"><input type="checkbox" id="chkShowX" checked onchange="updateGraphVisibility()">表示</label>
            </div>
            <div class="chart-wrapper"><canvas id="chartX"></canvas></div>
        </div>
        <div class="chart-box box-v">
            <div class="chart-title">
                v-t グラフ (速度)
                <label class="toggle-graph"><input type="checkbox" id="chkShowV" onchange="updateGraphVisibility()">表示</label>
            </div>
            <div class="chart-wrapper"><canvas id="chartV"></canvas></div>
        </div>
        <div class="chart-box box-a">
            <div class="chart-title">
                a-t グラフ (加速度)
                <label class="toggle-graph"><input type="checkbox" id="chkShowA" onchange="updateGraphVisibility()">表示</label>
            </div>
            <div class="chart-wrapper"><canvas id="chartA"></canvas></div>
        </div>
    </div>
</div>

<script>
    // --- 状態と設定の管理 ---
    const MAX_TIME = 10.0; 
    let isRunning = false;
    let time = 0;
    let lastTimestamp = 0;
    let reqAnimFrameId = null;
    let drawScale = 1; 
    let originOffset = 0; 
    let lastChartPushTime = -0.1; 

    let currentMode = 'horizontal';

    // 色の定数
    const COLOR_BALL_A = '#111111';
    const COLOR_BALL_B = '#007aff';
    const COLOR_X = '#28a745';
    const COLOR_V = '#fd7e14';
    const COLOR_A = '#6f42c1';

    // 描画負荷軽減のためのキャッシュ
    let currentBounds = { x: [0, 10], v: [0, 10], a: [0, 10] };
    let currentTickVal = 1;

    const modeSettings = {
        horizontal: {
            A: { enabled: true, x0: 0, v0: 5, a: 0 },
            B: { enabled: false, x0: 0, v0: 5, a: 0 } 
        },
        vertical_down: {
            A: { enabled: true, x0: 0, v0: 0, a: 9.8 },
            B: { enabled: false, x0: 0, v0: 0, a: 9.8 } 
        },
        vertical_up: {
            A: { enabled: true, x0: 0, v0: 10, a: -9.8 },
            B: { enabled: false, x0: 0, v0: 10, a: -9.8 } 
        }
    };

    let balls = {
        A: { color: COLOR_BALL_A, name: '小球A (黒)', ...modeSettings.horizontal.A, history: [] },
        B: { color: COLOR_BALL_B, name: '小球B (青)', ...modeSettings.horizontal.B, history: [] }
    };

    let chartData = { time: [], Ax:[], Av:[], Aa:[], Bx:[], Bv:[], Ba:[] };
    let chartInstances = {};

    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    // --- ユーティリティ ---
    function toSigFig2Str(num) {
        if (Math.abs(num) < 1e-6) return "0.0";
        let str = Number(num).toPrecision(2);
        if (str.includes('e')) return Number(str).toString(); 
        return str;
    }

    function setChartsInteractive(interactive) {
        document.querySelectorAll('.chart-wrapper').forEach(el => {
            el.style.pointerEvents = interactive ? 'auto' : 'none';
        });
    }

    // 方向によって x と y の表記を切り替える
    function updateLabelsForDirection() {
        const isHoriz = currentMode === 'horizontal';
        const posName = isHoriz ? 'x' : 'y';
        
        document.getElementById('labelX0A').innerText = posName + '₀';
        document.getElementById('labelX0B').innerText = posName + '₀';
        document.getElementById('titleChartX').innerText = posName + '-t グラフ (変位)';

        // 鉛直方向のときだけ重力ボタンを表示
        document.getElementById('btnGA').style.display = isHoriz ? 'none' : 'inline-block';
        document.getElementById('btnGB').style.display = isHoriz ? 'none' : 'inline-block';
    }

    // 重力加速度をセットする関数
    function setGravity(ballKey) {
        if (isRunning) return; 
        let g = 9.8;
        if (currentMode === 'vertical_up') g = -9.8;
        
        document.getElementById('inpA' + ballKey).value = g;
        onInputChange();
    }

    // --- 初期化処理 ---
    function init() {
        resizeCanvas();
        window.addEventListener('resize', () => { updateAll(); });
        initCharts();
        
        updateUIFromState();
        updateLabelsForDirection();
        initHistory();
        updateGraphVisibility();
        updateAll();
    }

    function initHistory() {
        balls.A.history = [{ t_start: 0, x0: balls.A.x0, v0: balls.A.v0, a: balls.A.a }];
        balls.B.history = [{ t_start: 0, x0: balls.B.x0, v0: balls.B.v0, a: balls.B.a }];
    }

    function updateGraphVisibility() {
        if (chartInstances.X && chartInstances.V && chartInstances.A) {
            renderCharts();
        }
    }

    function updateUIFromState() {
        document.getElementById('inpX0A').value = balls.A.x0;
        document.getElementById('inpV0A').value = balls.A.v0;
        document.getElementById('inpAA').value = balls.A.a;
        
        document.getElementById('enableBallB').checked = balls.B.enabled;
        document.getElementById('inpX0B').value = balls.B.x0;
        document.getElementById('inpV0B').value = balls.B.v0;
        document.getElementById('inpAB').value = balls.B.a;
    }

    function onDirectionChange() {
        const newMode = document.getElementById('directionSel').value;
        const mainArea = document.getElementById('mainArea');
        
        modeSettings[currentMode].A = { enabled: balls.A.enabled, x0: balls.A.x0, v0: balls.A.v0, a: balls.A.a };
        modeSettings[currentMode].B = { enabled: balls.B.enabled, x0: balls.B.x0, v0: balls.B.v0, a: balls.B.a };

        currentMode = newMode;

        Object.assign(balls.A, modeSettings[currentMode].A);
        Object.assign(balls.B, modeSettings[currentMode].B);

        if (currentMode === 'horizontal') {
            mainArea.className = 'main-area layout-horizontal';
        } else {
            mainArea.className = 'main-area layout-vertical';
        }
        
        updateUIFromState();
        updateLabelsForDirection();
        
        resetSim();
        
        setTimeout(() => {
            updateAll();
            Object.values(chartInstances).forEach(c => c.resize());
        }, 50); 
    }

    function checkAndPushHistory(ball, newAStr, ballKey) {
        let newA = parseFloat(newAStr) || 0;
        let lastH = ball.history[ball.history.length - 1];
        
        if (lastH.t_start === time) {
            lastH.a = newA;
            ball.a = newA;
        } else if (newA !== lastH.a) {
            let p = calcPhysics(ball, time); 
            ball.history.push({
                t_start: time,
                x0: p.x,
                v0: p.v,
                a: newA
            });
            ball.a = newA;
        }

        if (chartData.time.length > 0) {
            let lastIdx = chartData.time.length - 1;
            if (chartData.time[lastIdx] === time) {
                chartData[ballKey + 'a'][lastIdx].y = newA;
            }
        }
    }

    function onInputChange() {
        let x0A = parseFloat(document.getElementById('inpX0A').value) || 0;
        let v0A = parseFloat(document.getElementById('inpV0A').value) || 0;
        let aA  = parseFloat(document.getElementById('inpAA').value) || 0;
        
        let enB = document.getElementById('enableBallB').checked;
        let x0B = parseFloat(document.getElementById('inpX0B').value) || 0;
        let v0B = parseFloat(document.getElementById('inpV0B').value) || 0;
        let aB  = parseFloat(document.getElementById('inpAB').value) || 0;

        if (time === 0) {
            balls.A.x0 = x0A; balls.A.v0 = v0A; balls.A.a = aA;
            balls.B.enabled = enB; balls.B.x0 = x0B; balls.B.v0 = v0B; balls.B.a = aB;

            modeSettings[currentMode].A = { enabled: balls.A.enabled, x0: balls.A.x0, v0: balls.A.v0, a: balls.A.a };
            modeSettings[currentMode].B = { enabled: balls.B.enabled, x0: balls.B.x0, v0: balls.B.v0, a: balls.B.a };
            initHistory();
            updateAll();
        } else if (!isRunning) {
            checkAndPushHistory(balls.A, aA, 'A');
            checkAndPushHistory(balls.B, aB, 'B');
            updateAll();
            renderCharts();
        }
    }

    // --- 物理計算とスケール・原点調整 ---
    function calcPhysics(ball, t) {
        if (!ball.history || ball.history.length === 0) {
            return { x: ball.x0 + ball.v0*t + 0.5*ball.a*t*t, v: ball.v0 + ball.a*t, a: ball.a };
        }
        let h = ball.history[0];
        for (let i = ball.history.length - 1; i >= 0; i--) {
            if (t >= ball.history[i].t_start) {
                h = ball.history[i];
                break;
            }
        }
        let dt = t - h.t_start;
        return {
            x: h.x0 + h.v0 * dt + 0.5 * h.a * dt * dt,
            v: h.v0 + h.a * dt,
            a: h.a
        };
    }

    function calcBoundsAndScale() {
        let minX = 0, maxX = 0;
        let minV = 0, maxV = 0;
        let minA = 0, maxA = 0;
        let activeBallsCount = 0;

        const checkBounds = (ball) => {
            if (!ball.enabled) return;
            activeBallsCount++;
            
            let times = [0, MAX_TIME];
            
            if (ball.history) {
                ball.history.forEach(h => {
                    times.push(h.t_start);
                    if (h.a !== 0) {
                        let tPeak = h.t_start - h.v0 / h.a;
                        let hIdx = ball.history.indexOf(h);
                        let nextT = (hIdx < ball.history.length - 1) ? ball.history[hIdx + 1].t_start : MAX_TIME;
                        if (tPeak > h.t_start && tPeak < nextT) {
                            times.push(tPeak);
                        }
                    }
                });
            }

            let first = true;
            times.forEach(t => {
                let p = calcPhysics(ball, t);
                if(first && activeBallsCount === 1) { 
                    minX = maxX = p.x; 
                    minV = maxV = p.v;
                    minA = maxA = p.a;
                    first = false; 
                } else { 
                    minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); 
                    minV = Math.min(minV, p.v); maxV = Math.max(maxV, p.v);
                    minA = Math.min(minA, p.a); maxA = Math.max(maxA, p.a);
                }
            });
        };

        checkBounds(balls.A);
        checkBounds(balls.B);

        const isHoriz = currentMode === 'horizontal';
        const padding = isHoriz ? 70 : 100; 
        const canvasDim = isHoriz ? canvas.width : canvas.height;
        
        let availableLen = canvasDim - padding * 2;
        if (availableLen < 100) availableLen = 100; 
        
        let totalRange = maxX - minX;
        if (totalRange < 1) totalRange = 10; 

        drawScale = availableLen / totalRange;
        
        if (currentMode === 'horizontal') {
            originOffset = padding - minX * drawScale;
        } else if (currentMode === 'vertical_down') {
            originOffset = padding - minX * drawScale;
        } else { 
            originOffset = padding + maxX * drawScale;
        }

        return { x: [minX, maxX], v: [minV, maxV], a: [minA, maxA] };
    }

    function getScreenPos(val, offset) {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        
        if (currentMode === 'horizontal') {
            return { x: originOffset + val * drawScale, y: cy + offset };
        } else if (currentMode === 'vertical_down') {
            return { x: cx + offset, y: originOffset + val * drawScale };
        } else { 
            return { x: cx + offset, y: originOffset - val * drawScale };
        }
    }

    // 描画範囲などを計算し、キャッシュに保存する（負荷軽減）
    function updateAll() {
        resizeCanvas(); 
        currentBounds = calcBoundsAndScale();
        currentTickVal = calcTickInterval();
        updateChartBounds(currentBounds);
        if(!isRunning) drawCanvas(time);
    }

    // --- 描画処理 (Canvas) ---
    function resizeCanvas() {
        const wrap = document.getElementById('canvasWrap');
        if (wrap.clientWidth === 0 || wrap.clientHeight === 0) return;
        if (canvas.width !== wrap.clientWidth || canvas.height !== wrap.clientHeight) {
            canvas.width = wrap.clientWidth;
            canvas.height = wrap.clientHeight;
        }
    }

    function calcTickInterval() {
        const minPixels = 70; 
        const valPerMinPixels = minPixels / drawScale;
        if(valPerMinPixels === Infinity || isNaN(valPerMinPixels)) return 10;
        const mag = Math.pow(10, Math.floor(Math.log10(valPerMinPixels)));
        const res = valPerMinPixels / mag;
        let tick = 1;
        if (res > 5) tick = 10;
        else if (res > 2) tick = 5;
        else if (res > 1) tick = 2;
        return tick * mag;
    }

    function drawCanvas(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const isHoriz = currentMode === 'horizontal';
        const canvasDim = isHoriz ? canvas.width : canvas.height;
        const posName = isHoriz ? 'x' : 'y';
        
        // 毎回計算せずにキャッシュを使用する
        const tickVal = currentTickVal;
        const bounds = currentBounds; 
        
        let minVal = Math.floor(bounds.x[0] / tickVal) * tickVal - tickVal;
        let maxVal = Math.ceil(bounds.x[1] / tickVal) * tickVal + tickVal;

        const drawTextWithOutline = (text, x, y, color = '#555') => {
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.strokeText(text, x, y);
            ctx.fillStyle = color;
            ctx.fillText(text, x, y);
        };

        // 1. 背景グリッドと目盛り
        ctx.font = 'bold 14px Arial'; 
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        for (let val = minVal; val <= maxVal; val += tickVal) {
            let px = val * drawScale;
            let pos;
            if (currentMode === 'horizontal') pos = originOffset + px;
            else if (currentMode === 'vertical_down') pos = originOffset + px;
            else pos = originOffset - px;
            
            if (pos < 0 || pos > canvasDim) continue; 

            let text = Math.abs(val) < 0.001 ? '0' : parseFloat(val.toFixed(2)).toString();

            if (isHoriz) {
                ctx.strokeStyle = (val===0) ? '#999' : 'var(--grid-color)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, canvas.height); ctx.stroke();
                if(val !== 0) { ctx.beginPath(); ctx.moveTo(pos, cy - 8); ctx.lineTo(pos, cy + 8); ctx.strokeStyle='#333'; ctx.stroke(); }
                drawTextWithOutline(text, pos + 15, cy + 22); 
            } else {
                ctx.strokeStyle = (val===0) ? '#999' : 'var(--grid-color)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(canvas.width, pos); ctx.stroke();
                if(val !== 0) { ctx.beginPath(); ctx.moveTo(cx - 8, pos); ctx.lineTo(cx + 8, pos); ctx.strokeStyle='#333'; ctx.stroke(); }
                ctx.textAlign = 'left';
                drawTextWithOutline(text, cx + 15, pos - 15); 
            }
        }

        // 2. 座標軸と矢印
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.fillStyle = '#333';
        
        if (currentMode === 'horizontal') {
            ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
            let arrowX = canvas.width - 20; 
            ctx.beginPath(); ctx.moveTo(arrowX, cy); ctx.lineTo(arrowX - 12, cy - 6); ctx.lineTo(arrowX - 12, cy + 6); ctx.fill();
            ctx.textAlign = 'center'; ctx.font = 'bold 16px sans-serif'; ctx.fillText('+x (正)', arrowX - 25, cy - 20);
        } else if (currentMode === 'vertical_down') {
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
            let arrowY = canvas.height - 20; 
            ctx.beginPath(); ctx.moveTo(cx, arrowY); ctx.lineTo(cx - 6, arrowY - 12); ctx.lineTo(cx + 6, arrowY - 12); ctx.fill();
            ctx.textAlign = 'right'; ctx.font = 'bold 16px sans-serif'; ctx.fillText('+y (正)', cx - 15, arrowY - 15);
        } else { // vertical_up
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
            let arrowY = 20; 
            ctx.beginPath(); ctx.moveTo(cx, arrowY); ctx.lineTo(cx - 6, arrowY + 12); ctx.lineTo(cx + 6, arrowY + 12); ctx.fill();
            ctx.textAlign = 'right'; ctx.font = 'bold 16px sans-serif'; ctx.fillText('+y (正)', cx - 15, arrowY + 15);
        }

        // 3. 小球と各種パラメータの描画
        const drawObj = (ball, offset) => {
            if(!ball.enabled) return;
            const p = calcPhysics(ball, t);
            const pos = getScreenPos(p.x, offset);
            
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 16, 0, Math.PI*2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.font = 'bold 15px sans-serif';

            let isPrimary = offset <= 0; 
            let textX, textY_x, textY_v, textY_a, textAlignStr;
            const lineHeight = 18; 

            if (isHoriz) {
                textX = pos.x; 
                if (isPrimary) {
                    textY_a = pos.y - 20;
                    textY_v = textY_a - lineHeight;
                    textY_x = textY_v - lineHeight;
                } else {
                    textY_x = pos.y + 20;
                    textY_v = textY_x + lineHeight;
                    textY_a = textY_v + lineHeight;
                }
                textAlignStr = 'center';
            } else {
                if (isPrimary) {
                    textX = pos.x - 25; 
                    textAlignStr = 'right';
                } else {
                    textX = pos.x + 25; 
                    textAlignStr = 'left';
                }
                textY_v = pos.y;
                textY_x = textY_v - lineHeight;
                textY_a = textY_v + lineHeight;
            }
            
            ctx.textAlign = textAlignStr;
            
            drawTextWithOutline(`${posName}=${toSigFig2Str(p.x)} [m]`, textX, textY_x, COLOR_X);
            drawTextWithOutline(`v=${toSigFig2Str(p.v)} [m/s]`, textX, textY_v, COLOR_V);
            drawTextWithOutline(`a=${toSigFig2Str(p.a)} [m/s²]`, textX, textY_a, COLOR_A);
        };

        let offsetA = isHoriz ? -35 : -35;
        let offsetB = isHoriz ? 35 : 35;
        if (!balls.B.enabled) offsetA = 0; 

        const drawTrail = (ballKey, ball, offset) => {
            if (!ball.enabled) return;
            const trailData = chartData[ballKey + 'x'];
            if (!trailData) return;
            
            ctx.save();
            ctx.fillStyle = ball.color;
            ctx.globalAlpha = 0.4;
            
            for (let i = 0; i < trailData.length; i++) {
                if (i % 2 !== 0) continue;
                const pX = trailData[i].y;
                const pos = getScreenPos(pX, offset);
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 6, 0, Math.PI * 2); 
                ctx.fill();
            }
            ctx.restore();
        };

        drawTrail('A', balls.A, offsetA);
        drawTrail('B', balls.B, offsetB);

        drawObj(balls.A, offsetA);
        drawObj(balls.B, offsetB);
    }

    // --- グラフ処理 (Chart.js) ---
    function initCharts() {
        Chart.defaults.font.family = "'Helvetica Neue', 'Helvetica', 'Arial', sans-serif";
        Chart.defaults.animation = false;

        const config = (yLabel) => ({
            type: 'line',
            data: { labels: chartData.time, datasets: [] },
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { 
                    legend: { display: false }, 
                    title: { display: false }, // Chart.jsのタイトル機能は使わずHTMLで表示
                    tooltip: {
                        titleFont: { size: 22 }, 
                        bodyFont: { size: 22 },
                        padding: 10,
                        filter: function(context) {
                            const t = Math.round(context.parsed.x * 10) / 10;
                            return t % 0.5 === 0;
                        },
                        callbacks: {
                            title: function(context) {
                                return `t = ${context[0].parsed.x.toFixed(1)} 秒のとき`;
                            },
                            label: function(context) {
                                let labelName = context.dataset.label || '';
                                labelName = labelName.split(' ')[0]; 
                                
                                const yTitle = context.chart.options.scales.y.title.text;
                                let unit = '';
                                if (yTitle.includes('[m/s²]')) unit = 'm/s²';
                                else if (yTitle.includes('[m/s]')) unit = 'm/s';
                                else if (yTitle.includes('[m]')) unit = 'm';
                                
                                return `${labelName}: ${context.parsed.y.toFixed(2)} ${unit}`;
                            }
                        }
                    }
                },
                scales: {
                    x: { 
                        type: 'linear', 
                        min: 0, 
                        max: MAX_TIME, 
                        title: { display: true, text: 't [s]' },
                        border: { color: '#333', width: 2 }, // 枠の軸線を太くする
                        grid: {
                            // 値が0のラインだけ太く、色を濃くする
                            color: (context) => context.tick && context.tick.value === 0 ? '#333' : '#dee2e6',
                            lineWidth: (context) => context.tick && context.tick.value === 0 ? 2 : 1
                        }
                    },
                    y: { 
                        title: { display: true, text: yLabel },
                        border: { color: '#333', width: 2 }, // 枠の軸線を太くする
                        grid: {
                            // 値が0のラインだけ太く、色を濃くする
                            color: (context) => context.tick && context.tick.value === 0 ? '#333' : '#dee2e6',
                            lineWidth: (context) => context.tick && context.tick.value === 0 ? 2 : 1
                        }
                    },
                },
                elements: { line: { tension: 0.1, borderWidth: 2 }, point: { radius: 0, hitRadius: 15 } } 
            }
        });

        chartInstances.X = new Chart(document.getElementById('chartX'), config('変位 [m]'));
        chartInstances.V = new Chart(document.getElementById('chartV'), config('速度 [m/s]'));
        chartInstances.A = new Chart(document.getElementById('chartA'), config('加速度 [m/s²]'));
    }

    function updateChartBounds(bounds) {
        const getActualBounds = (prop) => {
            let min = bounds[prop][0];
            let max = bounds[prop][1];
            let kA = 'A' + prop;
            let kB = 'B' + prop;
            
            if (chartData[kA]) {
                chartData[kA].forEach(d => {
                    if (d.y < min) min = d.y;
                    if (d.y > max) max = d.y;
                });
            }
            if (balls.B.enabled && chartData[kB]) {
                chartData[kB].forEach(d => {
                    if (d.y < min) min = d.y;
                    if (d.y > max) max = d.y;
                });
            }
            return [min, max];
        };

        const bxData = getActualBounds('x');
        const bvData = getActualBounds('v');
        const baData = getActualBounds('a');

        const pad = (arr) => {
            let [min, max] = arr;
            
            if (Math.abs(min) < 1e-6 && Math.abs(max) < 1e-6) {
                return { min: -1, max: 1 };
            }

            let rng = max - min;
            if (rng === 0) rng = Math.abs(min) > 0 ? Math.abs(min) : 10;
            
            let pMin = min - rng*0.1;
            let pMax = max + rng*0.1;
            
            if (min >= 0) {
                pMin = 0;
            }
            if (max <= 0) {
                pMax = 0;
            }

            return { min: pMin, max: pMax };
        };

        const bx = pad(bxData), bv = pad(bvData), ba = pad(baData);

        chartInstances.X.options.scales.y.min = bx.min; chartInstances.X.options.scales.y.max = bx.max;
        chartInstances.V.options.scales.y.min = bv.min; chartInstances.V.options.scales.y.max = bv.max;
        chartInstances.A.options.scales.y.min = ba.min; chartInstances.A.options.scales.y.max = ba.max;
        
        Object.values(chartInstances).forEach(c => c.update('none'));
    }

    function pushChartData(t) {
        chartData.time.push(t);
        const pA = calcPhysics(balls.A, t);
        chartData.Ax.push({x: t, y: pA.x});
        chartData.Av.push({x: t, y: pA.v});
        chartData.Aa.push({x: t, y: pA.a});

        if (balls.B.enabled) {
            const pB = calcPhysics(balls.B, t);
            chartData.Bx.push({x: t, y: pB.x});
            chartData.Bv.push({x: t, y: pB.v});
            chartData.Ba.push({x: t, y: pB.a});
        }
    }

    function renderCharts() {
        const showX = document.getElementById('chkShowX').checked;
        const showV = document.getElementById('chkShowV').checked;
        const showA = document.getElementById('chkShowA').checked;

        const makeDataset = (ballKey, dataKey, isHidden) => ({
            label: balls[ballKey].name,
            data: chartData[ballKey+dataKey],
            borderColor: balls[ballKey].color,
            backgroundColor: balls[ballKey].color,
            borderWidth: 2, fill: false,
            hidden: isHidden
        });

        const datasetsX = [makeDataset('A', 'x', !showX)];
        const datasetsV = [makeDataset('A', 'v', !showV)];
        const datasetsA = [makeDataset('A', 'a', !showA)];

        if (balls.B.enabled) {
            datasetsX.push(makeDataset('B', 'x', !showX));
            datasetsV.push(makeDataset('B', 'v', !showV));
            datasetsA.push(makeDataset('B', 'a', !showA));
        }

        if (chartInstances.X) {
            chartInstances.X.data.datasets = datasetsX;
            chartInstances.V.data.datasets = datasetsV;
            chartInstances.A.data.datasets = datasetsA;

            Object.values(chartInstances).forEach(c => c.update('none'));
        }
    }

    // --- メインループ ---
    function step(timestamp) {
        if (!isRunning) return;
        
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = (timestamp - lastTimestamp) / 1000; 
        lastTimestamp = timestamp;

        time += deltaTime;

        if (time >= MAX_TIME) {
            time = MAX_TIME;
            isRunning = false;
            
            const btn = document.getElementById('startBtn');
            btn.innerText = '再スタート';
            btn.style.background = 'var(--primary)';
            
            document.getElementById('directionSel').disabled = false;
            document.querySelectorAll('.ball-settings input').forEach(el => el.disabled = false);
            document.querySelectorAll('.g-btn').forEach(el => el.disabled = false);

            setChartsInteractive(true); 

            document.getElementById('timeVal').innerText = time.toFixed(2);
            drawCanvas(time);
            pushChartData(MAX_TIME);
            renderCharts();
            return;
        }

        document.getElementById('timeVal').innerText = time.toFixed(2);
        drawCanvas(time);
        
        if (time - lastChartPushTime >= 0.1) {
            let pushTime = Math.round((lastChartPushTime + 0.1) * 10) / 10;
            pushChartData(pushTime);
            lastChartPushTime = pushTime;
            renderCharts();
        }

        if (isRunning) reqAnimFrameId = requestAnimationFrame(step);
    }

    function toggleSim() {
        if (time >= MAX_TIME) {
            time = 0;
            updateAll();
            for(let key in chartData) chartData[key] = [];
            lastChartPushTime = -0.1;
            initHistory();
        }

        const btn = document.getElementById('startBtn');
        if (isRunning) {
            isRunning = false;
            cancelAnimationFrame(reqAnimFrameId);
            btn.innerText = '再開';
            btn.style.background = '#28a745';
            
            if (time !== lastChartPushTime) {
                pushChartData(time);
                lastChartPushTime = time;
                renderCharts();
            }

            setChartsInteractive(true); 

            // 加速度のみ変更可能にする
            document.getElementById('inpAA').disabled = false;
            document.getElementById('inpAB').disabled = false;
            document.querySelectorAll('.g-btn').forEach(el => el.disabled = false);
        } else {
            // スタート・再開
            if (time === 0) {
                updateAll();
                document.getElementById('directionSel').disabled = true;
                for(let key in chartData) chartData[key] = [];
                lastChartPushTime = -0.1;
                initHistory();
            }
            
            document.querySelectorAll('.ball-settings input').forEach(el => el.disabled = true);
            document.querySelectorAll('.g-btn').forEach(el => el.disabled = true);
            setChartsInteractive(false); 
            
            isRunning = true;
            lastTimestamp = performance.now();
            reqAnimFrameId = requestAnimationFrame(step);
            btn.innerText = '一時停止';
            btn.style.background = '#dc3545';
        }
    }

    function resetSim() {
        isRunning = false;
        cancelAnimationFrame(reqAnimFrameId);
        time = 0;
        lastTimestamp = 0;
        lastChartPushTime = -0.1;
        document.getElementById('timeVal').innerText = '0.00';
        
        const btn = document.getElementById('startBtn');
        btn.innerText = 'スタート';
        btn.style.background = 'var(--primary)';
        
        document.getElementById('directionSel').disabled = false;
        document.querySelectorAll('.ball-settings input').forEach(el => el.disabled = false);
        document.querySelectorAll('.g-btn').forEach(el => el.disabled = false);

        setChartsInteractive(true);
        initHistory();

        for(let key in chartData) chartData[key] = []; 
        renderCharts();
        updateAll(); 
    }

    window.onload = init;
</script>
